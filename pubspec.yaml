name: darasadrive_mobile
description: DarasaDrive — NTSA theory tests & driving school booking (Flutter mobile).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  http: ^1.2.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

# 1. Launcher Icon Configuration (The Icon on the home screen)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/darasadrive_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/darasadrive_logo.png"

# 2. Splash Screen Configuration (The screen shown when app opens)
flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/Launcher_design.png"
  fullscreen: true
  android_gravity: center
  ios_content_mode: scaleAspectFit

  android_12:
    image: "assets/images/Launcher_design.png"
    color: "#ffffff"
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
